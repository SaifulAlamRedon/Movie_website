version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-cinemaflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-cinemaflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cinemaflow

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DATABASE_URL: ${DATABASE_URL:-}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-cinemaflow}
      DB_USERNAME: ${DB_USERNAME:-cinemaflow}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_RUN_MIGRATIONS: "true"
      ADMIN_SIGNUP_KEY: ${ADMIN_SIGNUP_KEY:?ADMIN_SIGNUP_KEY is required}
      ADMIN_TOKEN_SECRET: ${ADMIN_TOKEN_SECRET:?ADMIN_TOKEN_SECRET is required}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - cinemaflow

volumes:
  postgres_data:
  uploads_data:

networks:
  cinemaflow:
